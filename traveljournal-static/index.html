<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Travel Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Lora', serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .home {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 18px;
    }

    .home__image {
      width: min(80vw, 340px);
      height: auto;
      filter: drop-shadow(0 0 28px rgba(255,200,100,0.55));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    .home__title {
      font-family: 'Lobster', cursive;
      font-size: clamp(2.1rem, 5.3vw, 3.4rem);
      letter-spacing: 0.02em;
      font-weight: 400;
      line-height: 1.1;
      margin-top: -2px;
    }

    .home__subtitle {
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: #e2d4bb;
      max-width: 560px;
      line-height: 1.45;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.55);
    }

    .subtitle-line {
      opacity: 0;
      transform: translateY(8px);
      animation: subtitle-reveal 500ms ease forwards;
    }
    .subtitle-line--meta {
      font-size: clamp(0.9rem, 1.9vw, 1.03rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-style: normal;
      color: #c8b89a;
    }
    .subtitle-line--question {
      margin-top: 4px;
      font-size: clamp(1.25rem, 3.2vw, 1.9rem);
      font-style: italic;
      line-height: 1.28;
      color: #f0e8d5;
    }
    .subtitle-line:nth-child(1) { animation-delay: 120ms; }
    .subtitle-line:nth-child(2) { animation-delay: 420ms; }
    .subtitle-line:nth-child(3) { animation-delay: 720ms; }

    @keyframes subtitle-reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .home__button {
      border: none;
      background: #c8b89a;
      color: #111;
      padding: 14px 40px;
      border-radius: 999px;
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    .home__button:hover { background: #e0d0b0; }
  </style>
</head>
<body>
  <main class="home">
    <img src="images/house9.png" alt="Glowing lantern house" class="home__image" />
    <h1 class="home__title">My Travel Journal</h1>
    <p class="home__subtitle">
      <span class="subtitle-line subtitle-line--meta">Six glowing houses.</span>
      <span class="subtitle-line subtitle-line--meta">Six hidden places.</span>
      <span class="subtitle-line subtitle-line--question">Can you guess where I&apos;ve been?</span>
    </p>
    <a class="home__button" href="journey.html">Begin the Journey</a>
  </main>
</body>
</html>
