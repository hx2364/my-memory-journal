    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050507;
      min-height: 100vh;
      font-family: 'Lora', serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(0,0,0,0.6);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header__back {
      color: #c8b89a;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .header__back:hover { opacity: 1; }
    .header__title {
      font-family: 'Lobster', cursive;
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      font-weight: 400;
    }

    /* ── Main ── */
    .main {
      width: 100%;
      max-width: 860px;
      min-height: calc(100vh - 72px);
      padding: 24px 24px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    /* ── House image ── */
    .house-img {
      width: clamp(140px, 22vw, 220px);
      height: auto;
      filter: drop-shadow(0 0 22px rgba(255,200,80,0.8)) drop-shadow(0 0 50px rgba(255,160,40,0.5));
      animation: glow-pulse 3s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { filter: drop-shadow(0 0 18px rgba(255,200,80,0.7)) drop-shadow(0 0 40px rgba(255,160,40,0.4)); }
      50%      { filter: drop-shadow(0 0 30px rgba(255,220,100,1))  drop-shadow(0 0 65px rgba(255,180,60,0.7)); }
    }

    /* ── Chat ── */
    .chat-section { width: 100%; display: flex; flex-direction: column; gap: 16px; }

    .chat-intro {
      text-align: center;
      font-style: italic;
      color: #e2d4bb;
      font-size: clamp(1.02rem, 2.2vw, 1.2rem);
      line-height: 1.55;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-intro__line {
      opacity: 0;
      transform: translateY(8px);
      animation: chat-intro-reveal 500ms ease forwards;
    }
    .chat-intro__line:nth-child(1) { animation-delay: 120ms; }
    .chat-intro__line:nth-child(2) { animation-delay: 460ms; }

    @keyframes chat-intro-reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .progress { display: flex; justify-content: center; gap: 8px; }
    .progress__dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #333;
      border: 1.5px solid #666;
      transition: background 0.3s, border-color 0.3s;
    }
    .progress__dot.active {
      background: #f5c842;
      border-color: #f5c842;
      box-shadow: 0 0 6px rgba(245,200,66,0.7);
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 420px;
      overflow-y: auto;
      padding: 4px 2px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg--bot  { flex-direction: row; }
    .msg--user { flex-direction: row-reverse; }

    .msg__avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1.5px solid #444;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }

    .msg__bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 1.08rem;
      line-height: 1.72;
    }
    .msg--bot .msg__bubble {
      background: #1c1a14; border: 1px solid #3a3020; color: #f0e8d5;
      border-radius: 4px 16px 16px 16px;
    }
    .msg--user .msg__bubble {
      background: #2a2010; border: 1px solid #5a4020; color: #fff;
      border-radius: 16px 4px 16px 16px;
    }

    .typing-indicator { display: flex; gap: 5px; padding: 10px 14px; align-items: center; }
    .typing-indicator span {
      width: 7px; height: 7px; background: #c8b89a; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .chat-input-row { display: flex; gap: 10px; }
    .chat-input {
      flex: 1; background: #111; border: 1px solid #3a3020; color: #fff;
      padding: 12px 16px; border-radius: 999px;
      font-family: 'Lora', serif; font-size: 0.93rem; outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: #c8b89a; }
    .chat-input::placeholder { color: #555; }

    .chat-send {
      background: #c8b89a; color: #111; border: none; border-radius: 999px;
      padding: 12px 22px; font-family: 'Lora', serif; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .chat-send:hover { background: #e0d0b0; }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Guess ── */
    .guess-section { width: 100%; display: none; flex-direction: column; gap: 16px; }
    .guess-section.visible { display: flex; }

    .guess-title {
      text-align: center;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.3rem; color: #f5c842; letter-spacing: 0.06em;
    }

    .guess-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .guess-btn {
      background: #111; border: 1.5px solid #3a3020; color: #f0e8d5;
      padding: 14px 16px; border-radius: 12px;
      font-family: 'Lora', serif; font-size: 0.9rem; cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-align: left; line-height: 1.4;
    }
    .guess-btn:hover:not(:disabled) { background: #1c1a14; border-color: #c8b89a; transform: translateY(-2px); }
    .guess-btn.correct { background: #1a3020; border-color: #4caf50; color: #a5d6a7; }
    .guess-btn.wrong   { background: #2a1010; border-color: #e53935; color: #ef9a9a; }
    .guess-btn:disabled { cursor: default; }

    .guess-result {
      text-align: center; font-size: 1rem; line-height: 1.6;
      padding: 12px 16px; border-radius: 12px; display: none;
    }
    .guess-result.show { display: block; }
    .guess-result.correct-result { background: #1a3020; border: 1px solid #4caf50; color: #a5d6a7; }
    .guess-result.wrong-result   { background: #2a1010; border: 1px solid #e53935; color: #ef9a9a; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    @media (max-width: 520px) {
      .msg__bubble {
        font-size: 1rem;
      }
      .main {
        min-height: auto;
        justify-content: flex-start;
        padding-top: 20px;
      }
      .guess-options { grid-template-columns: 1fr; }
      .header { padding: 12px 16px; }
    }
  </style>

          return c.toLowerCase() !== city.toLowerCase();
        }).sort(function() { return Math.random() - 0.5; });
        buildOptions(shuffled.slice(0, 3));
      }

      return fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
        body: JSON.stringify({
          model: 'anthropic/claude-3.5-haiku',
          input: { prompt: prompt, max_tokens: 80, temperature: 0.9 }
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.output) { useFallback(); return; }
        try {
          var raw = data.output.join('').trim();
          // Extract JSON array even if surrounded by markdown or prose
          var match = raw.match(/\[[\s\S]*?\]/);
          if (!match) { useFallback(); return; }
          var wrong = JSON.parse(match[0]);
          if (!Array.isArray(wrong) || wrong.length < 3) { useFallback(); return; }
          buildOptions(wrong);
        } catch(e) { useFallback(); }
      })
      .catch(function() { useFallback(); });
    }

    // ─────────────────────────────────────────────────────────────────────
    // State
    // ─────────────────────────────────────────────────────────────────────
    const params  = new URLSearchParams(location.search);
    const houseId = params.get('id') || 'tokyo';
    const house   = HOUSES[houseId] || HOUSES.tokyo;

    // For user-submitted cities not in HOUSES, load their metadata from localStorage
    var userEntry = null;
    if (!HOUSES[houseId]) {
      try {
        var idx = JSON.parse(localStorage.getItem('user_entries_index') || '[]');
        userEntry = idx.find(function(e) { return e.citySlug === houseId; }) || null;
      } catch(e) {}
    }
    var isUserHouse = !!userEntry;

    const MAX_CLUES = 5;
    let conversationHistory = []; // flat string array — same as sketch.js
    let clueCount = 0;
    let gameOver  = false;
    var userHouseOptions = null;         // 4-item shuffled array for user house guess
    var userHouseOptionsPromise = null;  // resolves when options are ready
    let currentSpeechAudio = null;
    let audioUnlocked = false;
    let pendingSpeechText = "";

    // DOM refs
    const houseImg     = document.getElementById('houseImg');
    const headerTitle  = document.getElementById('headerTitle');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput    = document.getElementById('chatInput');
    const chatSend     = document.getElementById('chatSend');
    const chatInputRow = document.getElementById('chatInputRow');
    const guessSection = document.getElementById('guessSection');
    const guessOptions = document.getElementById('guessOptions');
    const guessResult  = document.getElementById('guessResult');
    const dots         = [0,1,2,3,4].map(i => document.getElementById('dot'+i));

    // ─────────────────────────────────────────────────────────────────────
    // Init
    // ─────────────────────────────────────────────────────────────────────
    function init() {
      houseImg.src = isUserHouse ? userEntry.houseImage : house.image;
      headerTitle.textContent = '? ? ?';

      setupAudioUnlock();

      // Seed history with system prompt — same as sketch.js setup()
      conversationHistory = [buildPrompt(houseId)];

      // Fire the first clue automatically
      callBot(null);
    }

    function setupAudioUnlock() {
      var unlock = async function() {
        audioUnlocked = true;
        try {
          // Prime audio playback in a user-gesture event so later TTS play() calls are allowed.
          var primer = new Audio();
          primer.src = "data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCA" +
            "gICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA";
          primer.volume = 0;
          await primer.play();
          primer.pause();
          primer.currentTime = 0;
        } catch (e) {
          // Some browsers may still reject primer playback; we still mark unlocked after gesture.
        }

        if (pendingSpeechText) {
          var text = pendingSpeechText;
          pendingSpeechText = "";
          speakWithElevenLabs(text);
        }
      };

      document.addEventListener("pointerdown", unlock, { once: true });
      document.addEventListener("keydown", unlock, { once: true });
      document.addEventListener("touchstart", unlock, { once: true });
    }

    // ─────────────────────────────────────────────────────────────────────
    // Chatbot — mirrors sketch.js chat() exactly
    // ─────────────────────────────────────────────────────────────────────
    function updateDots() {
      dots.forEach((d, i) => d.classList.toggle('active', i < clueCount));
    }

    function addMessage(role, text) {
      const wrap   = document.createElement('div');
      wrap.className = 'msg msg--' + (role === 'bot' ? 'bot' : 'user');
      const avatar = document.createElement('div');
      avatar.className = 'msg__avatar';
      avatar.textContent = role === 'bot' ? '📖' : '🧚🏻‍♀️';
      const bubble = document.createElement('div');
      bubble.className = 'msg__bubble';
      bubble.textContent = text;
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      chatMessages.appendChild(wrap);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg msg--bot';
      wrap.id = 'typingMsg';
      const avatar = document.createElement('div');
      avatar.className = 'msg__avatar';
      avatar.textContent = '📖';
      const bubble = document.createElement('div');
      bubble.className = 'msg__bubble typing-indicator';
      bubble.innerHTML = '<span></span><span></span><span></span>';
      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      chatMessages.appendChild(wrap);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingMsg');
      if (el) el.remove();
    }

    function callBot(userInput) {
      // Add user message to history — same as sketch.js
      if (userInput !== null) {
        conversationHistory.push("You: " + userInput);
        addMessage('user', userInput);
      }

      chatSend.disabled = true;
      chatInput.disabled = true;
      showTyping();

      // Per-clue specificity ladder — vague early, nearly obvious by clue 5
      const CLUE_GUIDANCE = [
        'Pure mood and atmosphere only — no geography, food, or transport. Just the feeling of the place.',
        'Introduce climate, season, or one sensory detail (smell, sound, texture). Still no place names or specific foods.',
        'Hint at food, transport, or a cultural habit. No country or city names yet.',
        'Be more specific — something recognizable that meaningfully narrows it down: a landscape feature, architectural style, or cultural detail.',
        'Nearly give it away — name a specific food, a landmark type, or a well-known cultural icon. End with READY_TO_GUESS on its own line.'
      ];

      const clueStatus = clueCount < MAX_CLUES
        ? '[Clue ' + (clueCount + 1) + ' of ' + MAX_CLUES + '. Specificity for this clue: ' + CLUE_GUIDANCE[clueCount] + ']'
        : '[All 5 clues given. Output only: READY_TO_GUESS]';

      // Fire options generation in parallel while clue 5 is being fetched
      if (isUserHouse && clueCount === MAX_CLUES - 1 && !userHouseOptionsPromise) {
        userHouseOptionsPromise = generateUserHouseOptions();
      }

      // Build full prompt — same as sketch.js fullPrompt
      const fullPrompt = conversationHistory.join("\n") + "\n" + clueStatus + "\nBot:";

      // Fetch call — same structure as sketch.js
      fetch(PROXY_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + authToken
        },
        body: JSON.stringify({
          model: "anthropic/claude-3.5-haiku",
          input: {
            prompt: fullPrompt,
            max_tokens: 150,
            temperature: 0.8,
            stop_sequences: ["\nYou:", "You:"]
          }
        })
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        removeTyping();

        if (data.output) {
          // Join output array — same as sketch.js: response.output.join("")
          var reply = data.output.join("").trim();

          // Check for stage-2 signal — match full or truncated variants
          var hasSignal = /READY_TO[\w_]*/i.test(reply);
          var cleanReply = reply
            .split(/\nYou:/i)[0]
            .replace(/READY_TO[\w_]*/gi, "").trim();

          // Save to history — same as sketch.js
          conversationHistory.push("Bot: " + cleanReply);

          if (cleanReply) {
            addMessage('bot', cleanReply);
            speakWithElevenLabs(cleanReply);
          }

          clueCount++;
          updateDots();

          // Stage 2: trigger guess screen when signal received OR after 5 clues
          if (hasSignal || clueCount >= MAX_CLUES) {
            clueCount = MAX_CLUES;
            updateDots();
            setTimeout(showGuess, 800);
            return;
          }
        } else {
          addMessage('bot', 'The house whispers… but something went quiet. Try again.');
        }

        chatSend.disabled = false;
        chatInput.disabled = false;
        chatInput.focus();
      })
      .catch(function(err) {
        removeTyping();
        console.error(err);
        addMessage('bot', 'The house whispers… but something went quiet. Try again.');
        chatSend.disabled = false;
        chatInput.disabled = false;
      });
    }

    async function speakWithElevenLabs(text) {
      if (!text) return;

      if (!ELEVENLABS_API_KEY) return;
      if (!audioUnlocked) {
        pendingSpeechText = text;
        return;
      }

      if (currentSpeechAudio) {
        currentSpeechAudio.pause();
        currentSpeechAudio = null;
      }

      try {
        const response = await fetch("https://api.elevenlabs.io/v1/text-to-speech/" + ELEVENLABS_VOICE_ID, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "xi-api-key": ELEVENLABS_API_KEY,
            "Accept": "audio/mpeg"
          },
          body: JSON.stringify({
            text: text,
            model_id: ELEVENLABS_MODEL_ID,
            voice_settings: {
              stability: 0.45,
              similarity_boost: 0.75
            }
          })
        });

        if (!response.ok) {
          throw new Error("ElevenLabs TTS failed (" + response.status + ")");
        }

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(audioUrl);
        currentSpeechAudio = audio;
        audio.addEventListener("ended", function() {
          URL.revokeObjectURL(audioUrl);
          if (currentSpeechAudio === audio) currentSpeechAudio = null;
        });
        audio.addEventListener("error", function() {
          URL.revokeObjectURL(audioUrl);
          if (currentSpeechAudio === audio) currentSpeechAudio = null;
        });
        await audio.play();
      } catch (err) {
        if (err && err.name === "NotAllowedError") {
          pendingSpeechText = text;
          audioUnlocked = false;
          setupAudioUnlock();
          return;
        }
        console.warn("Could not play ElevenLabs speech:", err);
      }
    }

    chatSend.addEventListener('click', function() {
      var text = limitWords(chatInput.value.trim());
      if (!text || gameOver) return;
      chatInput.value = '';
      callBot(text);
    });

    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') chatSend.click();
    });

    // ─────────────────────────────────────────────────────────────────────
    // Guess screen
    // ─────────────────────────────────────────────────────────────────────
    function showGuess() {
      chatInputRow.style.display = 'none';
      guessSection.classList.add('visible');

      if (isUserHouse) {
        // Show a loading state while the options promise resolves
        var loadingEl = document.createElement('p');
        loadingEl.style.cssText = 'text-align:center;color:#666;font-style:italic;font-size:0.9rem;padding:16px;width:100%';
        loadingEl.textContent = 'Preparing your options…';
        guessOptions.appendChild(loadingEl);

        // Trigger now if READY_TO_GUESS came before clue 5 (parallel trigger never fired)
        if (!userHouseOptionsPromise) {
          userHouseOptionsPromise = generateUserHouseOptions();
        }

        Promise.resolve(userHouseOptionsPromise).then(function() {
          guessOptions.innerHTML = '';
          var opts = userHouseOptions || [userEntry.city]; // fallback: show at least the correct answer
          opts.forEach(function(opt) {
            var btn = document.createElement('button');
            btn.className = 'guess-btn';
            btn.textContent = opt;
            btn.addEventListener('click', function() { handleGuess(opt, btn); });
            guessOptions.appendChild(btn);
          });
        });
      } else {
        house.options.forEach(function(opt) {
          var btn = document.createElement('button');
          btn.className = 'guess-btn';
          btn.textContent = opt;
          btn.addEventListener('click', function() { handleGuess(opt, btn); });
          guessOptions.appendChild(btn);
        });
      }

      guessSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function handleGuess(choice, btn) {
      gameOver = true;
      var correct = isUserHouse ? userEntry.city : house.options[0];

      if (!isUserHouse) {
        document.querySelectorAll('.guess-btn').forEach(function(b) { b.disabled = true; });
      }

      var normalise = function(s) { return s.trim().toLowerCase().replace(/[^a-z0-9]/g, ''); };
      var isCorrect = normalise(choice) === normalise(correct);

      if (isCorrect) {
        if (btn) btn.classList.add('correct');
        guessResult.className = 'guess-result show correct-result';
        guessResult.innerHTML = '✨ <strong>You got it!</strong> This house holds memories of <strong>' + correct + '</strong>. What a wonderful guess!';
      } else {
        if (btn) btn.classList.add('wrong');
        if (!isUserHouse) {
          document.querySelectorAll('.guess-btn').forEach(function(b) {
            if (b.textContent === correct) b.classList.add('correct');
          });
        }
        guessResult.className = 'guess-result show wrong-result';
        guessResult.innerHTML = 'Not quite — this house holds memories of <strong>' + correct + '</strong>. Perhaps you\'ll visit someday!';
      }
      headerTitle.textContent = correct;

      setTimeout(function() {
        var q = 'id=' + encodeURIComponent(houseId) + '&place=' + encodeURIComponent(correct);
        location.href = 'journal.html?' + q;
      }, 2200);
    }

    // ─────────────────────────────────────────────────────────────────────
    // Start
    // ─────────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
